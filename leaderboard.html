<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blackjack — Leaderboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:#0d0500;font-family:'Cinzel',serif;color:#f0f0f0;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 50% 20%,rgba(0,70,15,.25) 0%,transparent 70%);pointer-events:none;}
  .nav{display:flex;align-items:center;justify-content:space-between;padding:14px 32px;background:rgba(10,5,0,.9);border-bottom:1px solid rgba(255,215,100,.1);position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);}
  .nav-logo{font-size:18px;font-weight:700;color:#ffd764;letter-spacing:4px;}
  .nav-right{display:flex;gap:20px;}
  .nav-link{font-size:10px;letter-spacing:2px;color:rgba(255,215,100,.5);text-decoration:none;cursor:pointer;transition:color .2s;}
  .nav-link:hover{color:#ffd764;}
  .page{max-width:820px;margin:0 auto;padding:48px 24px 60px;}
  .page-header{text-align:center;margin-bottom:32px;}
  .page-title{font-size:36px;font-weight:900;letter-spacing:6px;color:#ffd764;text-shadow:0 0 30px rgba(255,215,100,.3);margin-bottom:8px;}
  .page-sub{font-size:11px;letter-spacing:3px;color:rgba(255,215,100,.35);font-family:'Crimson Text',serif;font-style:italic;}
  .auto-refresh{font-size:10px;color:rgba(255,215,100,.3);letter-spacing:1px;margin-top:4px;}

  .my-card{background:rgba(255,215,100,.05);border:1px solid rgba(255,215,100,.25);border-radius:10px;padding:18px 24px;display:flex;align-items:center;gap:20px;margin-bottom:28px;}
  .my-avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,#c9a227,#ffd764);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;color:#1a0a00;flex-shrink:0;}
  .my-info{flex:1;}
  .my-name{font-size:16px;color:#ffd764;letter-spacing:1px;margin-bottom:4px;}
  .my-stats{font-size:11px;color:rgba(255,255,255,.4);font-family:'Crimson Text',serif;}
  .my-balance{font-size:26px;font-weight:700;color:#4cff91;font-family:'Playfair Display',serif;text-shadow:0 0 12px rgba(76,255,145,.3);}

  .vip-badge{display:inline-block;font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:3px;font-weight:700;margin-left:8px;}
  .vip-Bronze{background:#cd7f32;color:#fff;}.vip-Silver{background:#aaa;color:#fff;}.vip-Gold{background:#c9a227;color:#1a0a00;}.vip-Platinum{background:#e5e4e2;color:#333;}.vip-Diamond{background:linear-gradient(135deg,#b9f2ff,#8866ff);color:#fff;}
  .player-avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#c9a227,#ffd764);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#1a0a00;flex-shrink:0;overflow:hidden;}
  .player-avatar img{width:100%;height:100%;object-fit:cover;}

  .lb-table{width:100%;border-collapse:collapse;}
  .lb-table thead tr{border-bottom:1px solid rgba(255,215,100,.15);}
  .lb-table th{font-size:9px;letter-spacing:3px;color:rgba(255,215,100,.4);text-transform:uppercase;padding:10px 14px;text-align:left;font-weight:600;}
  .lb-table th:last-child,.lb-table td:last-child{text-align:right;}
  .lb-table tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s;}
  .lb-table tbody tr:hover{background:rgba(255,215,100,.04);}
  .lb-table tbody tr.is-me{background:rgba(255,215,100,.06);}
  .lb-table td{padding:14px 14px;font-size:14px;font-family:'Crimson Text',serif;color:rgba(255,255,255,.8);}
  .rank-cell{display:flex;align-items:center;gap:10px;}
  .rank-num{font-family:'Cinzel',serif;font-size:13px;color:rgba(255,215,100,.4);min-width:22px;}
  .rank-1 .rank-num{color:#ffd764;font-size:16px;}.rank-2 .rank-num{color:#c0c0c0;}.rank-3 .rank-num{color:#cd7f32;}
  .player-name{font-family:'Cinzel',serif;font-size:13px;color:#f0f0f0;letter-spacing:.5px;}
  .player-name.is-me::after{content:' (You)';color:#ffd764;font-size:11px;}
  .balance-cell{font-family:'Playfair Display',serif;font-size:18px;color:#4cff91;font-weight:700;}
  .win-rate.high{color:#4cff91;}.win-rate.mid{color:#ffd764;}.win-rate.low{color:#ff6b6b;}
  .loading-state,.empty-state{text-align:center;padding:60px 0;color:rgba(255,215,100,.3);font-size:14px;letter-spacing:2px;font-family:'Crimson Text',serif;font-style:italic;}
  .spinner{width:32px;height:32px;border:2px solid rgba(255,215,100,.15);border-top-color:#ffd764;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .refresh-btn{background:transparent;border:1px solid rgba(255,215,100,.2);color:rgba(255,215,100,.5);font-family:'Cinzel',serif;font-size:10px;letter-spacing:2px;padding:8px 18px;border-radius:4px;cursor:pointer;transition:all .2s;margin-top:24px;display:block;margin-left:auto;margin-right:auto;}
  .refresh-btn:hover{border-color:rgba(255,215,100,.5);color:#ffd764;}
  .refresh-indicator{display:inline-block;width:6px;height:6px;background:#4cff91;border-radius:50%;margin-left:8px;animation:pulse 2s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-logo">♠ BLACKJACK</div>
  <div class="nav-right">
    <a class="nav-link" href="blackjack.html">← Back to Table</a>
    <a class="nav-link" href="multiplayer.html">🃏 Multiplayer</a>
    <a class="nav-link" href="profile.html">👤 Profile</a>
    <span class="nav-link" onclick="logout()">Sign Out</span>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">🏆 Leaderboard</div>
    <div class="page-sub">Top players ranked by balance</div>
    <div class="auto-refresh">Auto-refreshes every 30s <span class="refresh-indicator"></span></div>
  </div>

  <div class="my-card" id="myCard" style="display:none">
    <div class="my-avatar" id="myAvatar">?</div>
    <div class="my-info">
      <div class="my-name" id="myName">—</div>
      <div class="my-stats" id="myStats">—</div>
    </div>
    <div class="my-balance" id="myBalance">$—</div>
  </div>

  <div id="lbContainer"><div class="loading-state"><div class="spinner"></div>Loading...</div></div>
  <button class="refresh-btn" onclick="loadLeaderboard()">↻ Refresh Now</button>
</div>

<script>
const API = 'https://blackjack-casino-production.up.railway.app/api';
const token = localStorage.getItem('bj_token');
if (!token) window.location.href = 'index.html';
const userData = JSON.parse(localStorage.getItem('bj_user') || '{}');

function logout(){ localStorage.removeItem('bj_token'); localStorage.removeItem('bj_user'); window.location.href='index.html'; }

if (userData.username) {
  document.getElementById('myCard').style.display='flex';
  document.getElementById('myAvatar').textContent=userData.username[0].toUpperCase();
  document.getElementById('myName').textContent=userData.username;
  document.getElementById('myBalance').textContent='$'+(userData.balance||0).toLocaleString();
  const s=userData.stats||{};
  const wr=s.totalHands>0?Math.round(s.wins/s.totalHands*100):0;
  document.getElementById('myStats').textContent=`${s.totalHands||0} hands · ${s.wins||0}W ${s.losses||0}L · ${wr}% win rate · ${s.blackjacks||0} blackjacks`;
}

const medals=['🥇','🥈','🥉'];

async function loadLeaderboard() {
  try {
    const res = await fetch(`${API}/leaderboard`);
    if (!res.ok) throw new Error();
    const board = await res.json();
    if (!board.length){ document.getElementById('lbContainer').innerHTML='<div class="empty-state">No players yet — be the first!</div>'; return; }

    const rows = board.map(p=>{
      const isMe=p.username===userData.username;
      const wr=p.winRate, wrClass=wr>=50?'high':wr>=35?'mid':'low';
      const rankClass=p.rank<=3?`rank-${p.rank}`:'';
      const avatarHTML=p.avatar
        ?`<div class="player-avatar"><img src="${p.avatar}" alt=""/></div>`
        :`<div class="player-avatar">${esc((p.displayName||p.username)[0].toUpperCase())}</div>`;
      const displayName=p.displayName||p.username;
      return `<tr class="${isMe?'is-me':''} ${rankClass}">
        <td><div class="rank-cell"><span class="rank-num">${p.rank<=3?medals[p.rank-1]:p.rank}</span>${avatarHTML}<span class="player-name ${isMe?'is-me':''}">${esc(displayName)}</span><span class="vip-badge vip-${p.vipTier||'Bronze'}">${p.vipTier||'Bronze'}</span></div></td>
        <td><span class="balance-cell">$${p.balance.toLocaleString()}</span></td>
        <td>${(p.points||0).toLocaleString()}</td>
        <td>${p.totalHands}</td>
        <td>${p.wins} / ${p.losses}</td>
        <td><span class="win-rate ${wrClass}">${wr}%</span></td>
      </tr>`;
    }).join('');

    document.getElementById('lbContainer').innerHTML=`
      <table class="lb-table">
        <thead><tr><th>Player</th><th>Balance</th><th>Points</th><th>Hands</th><th>W / L</th><th>Win Rate</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;

    const me=board.find(p=>p.username===userData.username);
    if (me) document.getElementById('myBalance').textContent='$'+me.balance.toLocaleString();
  } catch {
    document.getElementById('lbContainer').innerHTML='<div class="empty-state">Could not load. Is the server running?</div>';
  }
}

function esc(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

loadLeaderboard();
setInterval(loadLeaderboard, 30000);
</script>
</body>
</html>
