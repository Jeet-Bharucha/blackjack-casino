<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Blackjack — Multiplayer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  body{min-height:100vh;background:#0d0500;font-family:'Cinzel',serif;color:#f0f0f0;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 50% 50%,rgba(0,70,15,.3) 0%,transparent 70%);pointer-events:none;}

  /* NAV */
  .nav{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;background:rgba(10,5,0,.9);border-bottom:1px solid rgba(255,215,100,.1);position:fixed;top:0;left:0;right:0;z-index:50;backdrop-filter:blur(8px);}
  .nav-logo{font-size:16px;font-weight:700;color:#ffd764;letter-spacing:3px;}
  .nav-right{display:flex;gap:16px;align-items:center;}
  .nav-link{font-size:10px;letter-spacing:2px;color:rgba(255,215,100,.5);text-decoration:none;cursor:pointer;transition:color .2s;}
  .nav-link:hover{color:#ffd764;}
  .nav-user{font-size:12px;color:#ffd764;}

  /* LAYOUT */
  .layout{display:flex;height:calc(100vh - 44px);margin-top:44px;}

  /* LOBBY */
  #lobbyView{width:100%;padding:32px;overflow-y:auto;}
  .lobby-title{font-size:24px;font-weight:700;color:#ffd764;letter-spacing:4px;margin-bottom:6px;}
  .lobby-sub{font-size:12px;color:rgba(255,255,255,.3);font-family:'Crimson Text',serif;font-style:italic;margin-bottom:28px;}
  .lobby-actions{display:flex;gap:12px;margin-bottom:28px;}
  .btn-create{background:linear-gradient(135deg,#c9a227,#ffd764,#c9a227);color:#1a0a00;border:none;padding:11px 28px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;font-weight:700;border-radius:4px;cursor:pointer;box-shadow:0 4px 12px rgba(201,162,39,.4);transition:all .2s;}
  .btn-create:hover{transform:translateY(-2px);}
  .btn-refresh{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,100,.2);color:rgba(255,215,100,.6);padding:11px 20px;font-family:'Cinzel',serif;font-size:11px;letter-spacing:2px;border-radius:4px;cursor:pointer;transition:all .2s;}
  .btn-refresh:hover{border-color:rgba(255,215,100,.5);color:#ffd764;}

  .tables-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:14px;}
  .table-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,215,100,.12);border-radius:10px;padding:18px;cursor:pointer;transition:all .2s;}
  .table-card:hover{border-color:rgba(255,215,100,.4);background:rgba(255,215,100,.05);transform:translateY(-2px);}
  .table-card-name{font-size:14px;color:#ffd764;margin-bottom:6px;}
  .table-card-info{font-size:11px;color:rgba(255,255,255,.4);font-family:'Crimson Text',serif;}
  .table-card-status{display:inline-block;font-size:9px;letter-spacing:2px;padding:2px 8px;border-radius:3px;margin-top:8px;}
  .status-waiting{background:rgba(76,255,145,.15);color:#4cff91;border:1px solid rgba(76,255,145,.3);}
  .status-betting{background:rgba(255,215,100,.15);color:#ffd764;border:1px solid rgba(255,215,100,.3);}
  .status-playing{background:rgba(255,68,68,.15);color:#ff6b6b;border:1px solid rgba(255,68,68,.3);}
  .no-tables{color:rgba(255,215,100,.3);font-family:'Crimson Text',serif;font-style:italic;padding:40px 0;}

  /* GAME VIEW */
  #gameView{display:none;width:100%;flex-direction:column;}
  .game-layout{display:flex;flex:1;overflow:hidden;}

  /* TABLE AREA */
  .table-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px 20px;position:relative;}

  .mp-table{position:relative;width:min(820px,100%);height:min(460px,calc(100vh - 200px));background:radial-gradient(ellipse 90% 80% at 50% 55%,#1a5c2a 0%,#0f3d1a 50%,#0a2e13 100%);border-radius:50%/30%;border:12px solid #3a1f05;box-shadow:0 0 0 4px #5c3208,0 0 0 8px #3a1f05,inset 0 2px 60px rgba(0,0,0,.6),0 20px 60px rgba(0,0,0,.9);display:flex;flex-direction:column;align-items:center;justify-content:space-between;padding:20px 50px 16px;overflow:hidden;}
  .mp-table::before{content:'';position:absolute;inset:0;background-image:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px),repeating-linear-gradient(90deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);border-radius:inherit;pointer-events:none;}
  .mp-table-text{position:absolute;top:28px;font-size:9px;letter-spacing:5px;color:rgba(255,215,100,.25);text-transform:uppercase;}

  /* DEALER ZONE */
  .mp-dealer-zone{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .mp-zone-label{font-size:9px;letter-spacing:3px;color:rgba(255,215,100,.4);text-transform:uppercase;}
  .mp-hand{display:flex;align-items:center;justify-content:center;min-height:90px;position:relative;}
  .mp-score{position:absolute;right:-44px;top:50%;transform:translateY(-50%);background:rgba(0,0,0,.7);border:1px solid rgba(255,215,100,.4);border-radius:5px;padding:3px 8px;font-size:15px;font-weight:700;color:#ffd764;font-family:'Playfair Display',serif;}

  /* PLAYERS ROW */
  .mp-players-row{display:flex;gap:8px;align-items:flex-end;justify-content:center;width:100%;}
  .mp-seat{display:flex;flex-direction:column;align-items:center;gap:3px;min-width:80px;}
  .mp-seat.empty{opacity:.3;}
  .mp-seat.my-seat .seat-name{color:#ffd764;}
  .mp-seat.active-seat .seat-cards{filter:drop-shadow(0 0 10px rgba(255,215,100,.6));}
  .seat-name{font-size:9px;letter-spacing:1px;color:rgba(255,255,255,.6);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:90px;}
  .seat-bet{font-size:9px;color:rgba(76,255,145,.7);}
  .seat-cards{display:flex;min-height:75px;align-items:center;justify-content:center;}
  .seat-status{font-size:8px;letter-spacing:1px;padding:2px 6px;border-radius:3px;}
  .seat-status.done{background:rgba(255,68,68,.2);color:#ff6b6b;}
  .seat-status.playing{background:rgba(255,215,100,.2);color:#ffd764;}

  /* MINI CARD */
  .mini-card{width:36px;height:52px;border-radius:4px;background:#fefdf8;border:1px solid #ddd;display:flex;flex-direction:column;justify-content:space-between;padding:2px 3px;margin:0 -4px;font-family:'Playfair Display',serif;font-size:9px;box-shadow:1px 2px 6px rgba(0,0,0,.4);}
  .mini-card.red{color:#c8102e;}.mini-card.black{color:#1a1a1a;}
  .mini-card.face-down{background:#1a237e;border-color:#1a237e;}
  .mini-card.face-down::after{content:'♠';color:rgba(255,255,255,.2);font-size:14px;display:flex;align-items:center;justify-content:center;flex:1;}
  .mini-rank{font-weight:700;font-size:10px;line-height:1;}
  .mini-suit{font-size:8px;line-height:1;}

  /* MIDDLE */
  .mp-middle{flex:1;display:flex;align-items:center;justify-content:center;}
  .mp-status{font-size:16px;font-weight:700;color:#ffd764;letter-spacing:2px;text-align:center;text-shadow:0 0 16px rgba(255,215,100,.5);}
  .mp-timer{font-size:28px;font-weight:700;color:#ffd764;font-family:'Playfair Display',serif;text-shadow:0 0 20px rgba(255,215,100,.6);}
  .mp-timer.urgent{color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,.6);}

  /* BOTTOM CONTROLS */
  .mp-controls{padding:10px 20px;background:rgba(10,5,0,.7);border-top:1px solid rgba(255,215,100,.08);display:flex;flex-direction:column;gap:8px;align-items:center;}
  .mp-bet-row{display:flex;gap:6px;align-items:center;justify-content:center;}
  .mp-chip{width:42px;height:42px;border-radius:50%;border:3px solid rgba(255,255,255,.25);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;font-family:'Cinzel',serif;color:#fff;position:relative;transition:transform .15s;box-shadow:0 3px 6px rgba(0,0,0,.5);}
  .mp-chip::before{content:'';position:absolute;inset:3px;border-radius:50%;border:1px dashed rgba(255,255,255,.2);}
  .mp-chip:hover{transform:translateY(-3px) scale(1.08);}
  .mp-chip.disabled{opacity:.35;pointer-events:none;}
  .chip-1{background:radial-gradient(circle at 35% 35%,#f5f5f5,#bbb);color:#222;border-color:#999;}
  .chip-5{background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b);border-color:#e74c3c;}
  .chip-10{background:radial-gradient(circle at 35% 35%,#5dade2,#1a5276);border-color:#2980b9;}
  .chip-25{background:radial-gradient(circle at 35% 35%,#58d68d,#1e8449);border-color:#27ae60;}
  .chip-100{background:radial-gradient(circle at 35% 35%,#af7ac5,#6c3483);border-color:#8e44ad;}
  .mp-btn-row{display:flex;gap:8px;}
  .mp-btn{padding:8px 18px;font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:2px;border:none;border-radius:4px;cursor:pointer;transition:all .15s;}
  .mp-btn:disabled{opacity:.3;cursor:not-allowed;pointer-events:none;}
  .mp-btn.hit{background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;}
  .mp-btn.stand{background:linear-gradient(135deg,#c0392b,#e74c3c);color:#fff;}
  .mp-btn.double{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;}
  .mp-btn.leave{background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.12);font-size:10px;}
  .mp-info-row{display:flex;gap:24px;}
  .mp-info{display:flex;flex-direction:column;align-items:center;gap:1px;}
  .mp-info-label{font-size:8px;letter-spacing:2px;color:rgba(255,215,100,.4);text-transform:uppercase;}
  .mp-info-val{font-size:18px;font-weight:700;color:#ffd764;font-family:'Playfair Display',serif;}
  .mp-info-val.green{color:#4cff91;}

  /* CHAT */
  .chat-panel{width:240px;border-left:1px solid rgba(255,215,100,.1);display:flex;flex-direction:column;background:rgba(10,5,0,.7);}
  .chat-header{padding:12px 14px;border-bottom:1px solid rgba(255,215,100,.08);font-size:10px;letter-spacing:3px;color:rgba(255,215,100,.5);}
  .chat-messages{flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:6px;}
  .chat-messages::-webkit-scrollbar{width:4px;}
  .chat-messages::-webkit-scrollbar-thumb{background:rgba(255,215,100,.2);border-radius:2px;}
  .chat-msg{font-size:12px;font-family:'Crimson Text',serif;line-height:1.4;}
  .chat-msg .chat-user{color:#ffd764;font-weight:600;}
  .chat-msg.system{color:rgba(255,215,100,.4);font-style:italic;font-size:11px;}
  .chat-msg.join{color:#4cff91;font-style:italic;font-size:11px;}
  .chat-msg.leave{color:#ff6b6b;font-style:italic;font-size:11px;}
  .chat-msg.bet{color:rgba(76,255,145,.6);font-style:italic;font-size:11px;}
  .chat-input-row{display:flex;gap:6px;padding:10px;border-top:1px solid rgba(255,215,100,.08);}
  .chat-input{flex:1;background:rgba(255,255,255,.05);border:1px solid rgba(255,215,100,.15);border-radius:4px;padding:7px 10px;color:#f0f0f0;font-family:'Crimson Text',serif;font-size:13px;outline:none;}
  .chat-input:focus{border-color:rgba(255,215,100,.4);}
  .chat-send{background:rgba(255,215,100,.15);border:1px solid rgba(255,215,100,.3);color:#ffd764;padding:7px 12px;border-radius:4px;cursor:pointer;font-size:12px;transition:all .2s;}
  .chat-send:hover{background:rgba(255,215,100,.25);}

  /* RESULT BANNER */
  .result-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(.8);background:rgba(10,5,0,.97);border:2px solid rgba(255,215,100,.5);border-radius:12px;padding:20px 36px;text-align:center;opacity:0;transition:all .4s;pointer-events:none;z-index:20;}
  .result-banner.show{opacity:1;transform:translate(-50%,-50%) scale(1);}
  .result-banner-title{font-size:22px;font-weight:700;letter-spacing:3px;margin-bottom:6px;}
  .result-banner.win .result-banner-title{color:#4cff91;}
  .result-banner.lose .result-banner-title{color:#ff4444;}
  .result-banner.push .result-banner-title{color:#ffd764;}
  .result-list{font-family:'Crimson Text',serif;font-size:13px;color:rgba(255,255,255,.6);}

  /* BET DISPLAY */
  .my-bet-display{font-size:11px;color:rgba(255,215,100,.6);letter-spacing:1px;}

  .toast{position:fixed;top:54px;left:50%;transform:translateX(-50%) translateY(-60px);background:rgba(20,10,0,.95);border:1px solid rgba(255,215,100,.3);border-radius:6px;padding:9px 22px;color:#ffd764;font-size:12px;letter-spacing:1px;z-index:400;transition:transform .3s;pointer-events:none;}
  .toast.show{transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-logo">♠ BLACKJACK — MULTIPLAYER</div>
  <div class="nav-right">
    <span class="nav-user" id="navUser">...</span>
    <a class="nav-link" href="blackjack.html">Single Player</a>
    <a class="nav-link" href="leaderboard.html">🏆 Leaderboard</a>
    <span class="nav-link" onclick="logout()">Sign Out</span>
  </div>
</nav>

<div class="layout">

  <!-- LOBBY -->
  <div id="lobbyView">
    <div class="lobby-title">🃏 Live Tables</div>
    <div class="lobby-sub">Join an existing table or create your own</div>
    <div class="lobby-actions">
      <button class="btn-create" onclick="createTable()">+ Create Table</button>
      <button class="btn-refresh" onclick="requestTables()">↻ Refresh</button>
    </div>
    <div class="tables-grid" id="tablesGrid"><div class="no-tables">Connecting to server...</div></div>
  </div>

  <!-- GAME -->
  <div id="gameView">
    <div class="game-layout">

      <!-- TABLE -->
      <div class="table-area">
        <div class="mp-table">
          <div class="mp-table-text">Blackjack Pays 3 to 2 · Dealer Must Stand on 17</div>

          <div class="mp-dealer-zone">
            <div class="mp-zone-label">Dealer</div>
            <div class="mp-hand" id="mpDealerHand">
              <span class="mp-score" id="mpDealerScore" style="display:none"></span>
            </div>
          </div>

          <div class="mp-middle">
            <div>
              <div class="mp-status" id="mpStatus">Waiting for players...</div>
              <div class="mp-timer" id="mpTimer" style="display:none"></div>
            </div>
          </div>

          <div class="mp-players-row" id="mpPlayersRow"></div>

          <!-- Result banner -->
          <div class="result-banner" id="resultBanner">
            <div class="result-banner-title" id="resultBannerTitle"></div>
            <div class="result-list" id="resultList"></div>
          </div>
        </div>

        <!-- Controls -->
        <div class="mp-controls">
          <div class="mp-info-row">
            <div class="mp-info"><span class="mp-info-label">Balance</span><span class="mp-info-val green" id="mpBalance">$—</span></div>
            <div class="mp-info"><span class="mp-info-label">My Bet</span><span class="mp-info-val" id="mpBetDisplay">$0</span></div>
          </div>
          <div class="mp-bet-row" id="mpChips">
            <div class="mp-chip chip-1  disabled" onclick="mpBet(1)">$1</div>
            <div class="mp-chip chip-5  disabled" onclick="mpBet(5)">$5</div>
            <div class="mp-chip chip-10 disabled" onclick="mpBet(10)">$10</div>
            <div class="mp-chip chip-25 disabled" onclick="mpBet(25)">$25</div>
            <div class="mp-chip chip-100 disabled" onclick="mpBet(100)">$100</div>
          </div>
          <div class="mp-btn-row">
            <button class="mp-btn hit"    id="mpHit"    onclick="mpAction('mp_hit')"    disabled>Hit</button>
            <button class="mp-btn stand"  id="mpStand"  onclick="mpAction('mp_stand')"  disabled>Stand</button>
            <button class="mp-btn double" id="mpDouble" onclick="mpAction('mp_double')" disabled>Double</button>
            <button class="mp-btn leave"  onclick="leaveTable()">Leave Table</button>
          </div>
        </div>
      </div>

      <!-- CHAT -->
      <div class="chat-panel">
        <div class="chat-header">💬 Table Chat</div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-row">
          <input class="chat-input" id="chatInput" placeholder="Say something..." maxlength="120" onkeydown="if(event.key==='Enter') sendChat()"/>
          <button class="chat-send" onclick="sendChat()">➤</button>
        </div>
      </div>

    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="http://localhost:4000/socket.io/socket.io.js"></script>
<script>
const token = localStorage.getItem('bj_token');
if (!token) window.location.href = 'index.html';
const me = JSON.parse(localStorage.getItem('bj_user') || '{}');
document.getElementById('navUser').textContent = me.username || '—';

function logout(){ localStorage.removeItem('bj_token'); localStorage.removeItem('bj_user'); window.location.href='index.html'; }
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2500); }

const RED_SUITS = new Set(['♥','♦']);
let myBalance = me.balance || 1000;
let myBet = 0;
let mySeatIndex = -1;
let currentTableId = null;
let myTurn = false;
let tablePhase = 'waiting';

// ── SOCKET ─────────────────────────────────────────
const socket = io('http://localhost:4000');
socket.emit('auth', { token });

socket.on('table_list', tables => renderLobby(tables));
socket.on('table_created', ({ tableId }) => socket.emit('join_table', { tableId, token }));
socket.on('joined_table', ({ tableId, seatIndex, balance }) => {
  currentTableId = tableId; mySeatIndex = seatIndex; myBalance = balance;
  document.getElementById('mpBalance').textContent = '$' + balance;
  showGame();
});
socket.on('table_update', state => renderTable(state));
socket.on('game_message', ({ text, type }) => addChat(text, type));
socket.on('new_chat', ({ username, message }) => addChat(`${username}: ${message}`, 'msg'));
socket.on('timer', secs => {
  const el = document.getElementById('mpTimer');
  el.style.display = ''; el.textContent = secs + 's';
  el.className = 'mp-timer' + (secs <= 5 ? ' urgent' : '');
});
socket.on('turn_timer', ({ secs, seatIndex }) => {
  if (seatIndex === mySeatIndex) {
    const el = document.getElementById('mpTimer');
    el.style.display = ''; el.textContent = secs + 's';
    el.className = 'mp-timer' + (secs <= 5 ? ' urgent' : '');
  }
});
socket.on('your_turn', ({ seatIndex }) => {
  myTurn = seatIndex === mySeatIndex;
  if (myTurn) { enableActions(true); showToast('Your turn!'); }
  else enableActions(false);
});
socket.on('round_results', ({ results, dealerTotal, dealerCards }) => {
  showResults(results, dealerTotal);
  disableChips(); enableActions(false); myBet = 0;
  document.getElementById('mpBetDisplay').textContent = '$0';
  setTimeout(hideResults, 5500);
});
socket.on('error_msg', msg => showToast(msg));

// ── LOBBY ───────────────────────────────────────────
function requestTables() { socket.emit('get_tables'); }
function createTable() {
  const name = (me.username || 'Player') + "'s Table";
  socket.emit('create_table', { name, token });
}

function renderLobby(tables) {
  const grid = document.getElementById('tablesGrid');
  if (!tables.length) { grid.innerHTML='<div class="no-tables">No tables yet — create one!</div>'; return; }
  grid.innerHTML = tables.map(t => `
    <div class="table-card" onclick="joinTable('${t.id}')">
      <div class="table-card-name">${esc(t.name)}</div>
      <div class="table-card-info">${t.playerCount}/5 players</div>
      <span class="table-card-status status-${t.phase}">${t.phase}</span>
    </div>
  `).join('');
}

function joinTable(tableId) { socket.emit('join_table', { tableId, token }); }

function showGame() {
  document.getElementById('lobbyView').style.display = 'none';
  document.getElementById('gameView').style.display = 'flex';
  document.getElementById('gameView').style.flexDirection = 'column';
}

function leaveTable() {
  socket.emit('leave_table');
  currentTableId = null; mySeatIndex = -1; myBet = 0; myTurn = false;
  document.getElementById('lobbyView').style.display = '';
  document.getElementById('gameView').style.display = 'none';
  document.getElementById('mpDealerHand').innerHTML='<span class="mp-score" id="mpDealerScore" style="display:none"></span>';
  document.getElementById('mpPlayersRow').innerHTML='';
  document.getElementById('chatMessages').innerHTML='';
  requestTables();
}

// ── TABLE RENDER ───────────────────────────────────
function renderTable(state) {
  tablePhase = state.phase;
  document.getElementById('mpStatus').textContent = phaseLabel(state.phase);
  document.getElementById('mpTimer').style.display = ['betting'].includes(state.phase) ? '' : 'none';

  // Dealer hand
  const dHand = document.getElementById('mpDealerHand');
  const existingScore = dHand.querySelector('.mp-score');
  dHand.innerHTML = '';
  if (existingScore) dHand.appendChild(existingScore); else { const s=document.createElement('span'); s.className='mp-score'; s.id='mpDealerScore'; s.style.display='none'; dHand.appendChild(s); }

  state.dealerCards.forEach(c => dHand.insertBefore(buildMiniCard(c), dHand.querySelector('.mp-score')));
  const dScore = document.getElementById('mpDealerScore');
  if (state.dealerCards.length) {
    const visible = state.dealerCards.filter(c=>c.rank!=='?');
    if (visible.length) { dScore.style.display=''; dScore.textContent = handTotal(visible); }
  } else { dScore.style.display='none'; }

  // Players
  const row = document.getElementById('mpPlayersRow');
  row.innerHTML = '';
  state.seats.forEach((seat, i) => {
    const div = document.createElement('div');
    div.className = 'mp-seat' + (!seat?' empty':'') + (i===mySeatIndex?' my-seat':'') + (i===state.currentSeat?' active-seat':'');
    if (!seat) {
      div.innerHTML = `<div class="seat-name" style="color:rgba(255,255,255,.2)">Empty</div><div class="seat-cards"></div>`;
    } else {
      const hand = seat.hands?.[seat.hands.length-1] || { cards:[] };
      const cards = (seat.hands||[]).flatMap(h=>h.cards);
      const isDone = seat.done;
      div.innerHTML = `
        <div class="seat-name">${esc(seat.username)}${i===mySeatIndex?' (You)':''}</div>
        <div class="seat-bet">${seat.hasBet?'$'+seat.bet:''}</div>
        <div class="seat-cards" id="seatCards${i}"></div>
        ${isDone?'<div class="seat-status done">Done</div>':i===state.currentSeat?'<div class="seat-status playing">Playing</div>':''}
      `;
      row.appendChild(div);
      const cardsEl = div.querySelector(`#seatCards${i}`);
      cards.forEach(c => cardsEl.appendChild(buildMiniCard(c)));
      return;
    }
    row.appendChild(div);
  });

  // Update my balance from seat
  const mySeat = state.seats[mySeatIndex];
  if (mySeat) {
    myBalance = mySeat.balance;
    document.getElementById('mpBalance').textContent = '$' + myBalance;
  }

  // Chips
  const canBet = state.phase === 'betting' && mySeatIndex !== -1;
  document.getElementById('mpChips').querySelectorAll('.mp-chip').forEach(c => c.classList.toggle('disabled', !canBet));
}

function phaseLabel(phase) {
  return { waiting:'Waiting for players...', betting:'Place your bets!', dealing:'Dealing cards...', playing:'Game in progress', dealer_turn:"Dealer's turn", results:'Round over' }[phase] || phase;
}

function buildMiniCard(card) {
  const el = document.createElement('div');
  if (card.rank === '?') { el.className='mini-card face-down'; return el; }
  el.className = 'mini-card ' + (RED_SUITS.has(card.suit)?'red':'black');
  el.innerHTML = `<div class="mini-rank">${card.rank}</div><div class="mini-suit">${card.suit}</div>`;
  return el;
}

function handTotal(cards) {
  let t=0,a=0;
  for(const c of cards){ if(c.rank==='?') continue; const v=['J','Q','K'].includes(c.rank)?10:c.rank==='A'?11:parseInt(c.rank); t+=v; if(c.rank==='A') a++; }
  while(t>21&&a>0){t-=10;a--;}
  return t;
}

// ── BETTING ────────────────────────────────────────
function mpBet(amount) {
  if (tablePhase !== 'betting') return;
  if (myBet + amount > myBalance) { showToast('Insufficient balance'); return; }
  myBet += amount;
  document.getElementById('mpBetDisplay').textContent = '$' + myBet;
  socket.emit('place_bet', { amount: myBet });
}

// ── ACTIONS ────────────────────────────────────────
function mpAction(event) { if (!myTurn) return; socket.emit(event); myTurn=false; enableActions(false); }
function enableActions(on) {
  document.getElementById('mpHit').disabled = !on;
  document.getElementById('mpStand').disabled = !on;
  document.getElementById('mpDouble').disabled = !on;
}
function disableChips() { document.getElementById('mpChips').querySelectorAll('.mp-chip').forEach(c=>c.classList.add('disabled')); }

// ── CHAT ───────────────────────────────────────────
function addChat(text, type='msg') {
  const box = document.getElementById('chatMessages');
  const el = document.createElement('div');
  if (type==='msg') {
    const colon = text.indexOf(': ');
    if (colon>-1) { el.className='chat-msg'; el.innerHTML=`<span class="chat-user">${esc(text.slice(0,colon))}</span>${esc(text.slice(colon))}`; }
    else { el.className='chat-msg'; el.textContent=text; }
  } else { el.className=`chat-msg ${type}`; el.textContent=text; }
  box.appendChild(el);
  box.scrollTop=box.scrollHeight;
}

function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  socket.emit('send_chat', { message: msg });
  input.value = '';
}

// ── RESULTS ────────────────────────────────────────
function showResults(results, dealerTotal) {
  const banner = document.getElementById('resultBanner');
  const myResult = results.find(r => r.seatIndex === mySeatIndex);
  let bannerClass = 'push', bannerTitle = 'Round Over';
  let listHtml = `<div>Dealer: ${dealerTotal}</div>`;

  results.forEach(r => {
    r.handResults.forEach(h => {
      const isMe = r.seatIndex === mySeatIndex;
      listHtml += `<div style="color:${h.result==='win'||h.result==='blackjack'||h.result==='dealer_bust'?'#4cff91':h.result==='push'?'#ffd764':'#ff6b6b'}">${isMe?'You':esc(r.username)}: ${h.total} — ${h.result} ${h.payout>0?'(+$'+(h.payout-r.handResults[0].payout/r.handResults.length|0)+')':''}</div>`;
    });
  });

  if (myResult) {
    const w = myResult.handResults.some(h=>['win','blackjack','dealer_bust'].includes(h.result));
    const l = myResult.handResults.every(h=>['lose','bust'].includes(h.result));
    bannerClass = w?'win':l?'lose':'push';
    bannerTitle = w?'You Win!':l?'Dealer Wins':'Push';
    myBalance = myResult.newBalance;
    document.getElementById('mpBalance').textContent = '$' + myBalance;
  }

  document.getElementById('resultBannerTitle').textContent = bannerTitle;
  document.getElementById('resultList').innerHTML = listHtml;
  banner.className = `result-banner ${bannerClass}`;
  requestAnimationFrame(()=>banner.classList.add('show'));
}

function hideResults() {
  document.getElementById('resultBanner').classList.remove('show');
}

function esc(s){ if(!s) return ''; return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

requestTables();
setInterval(requestTables, 10000);
</script>
