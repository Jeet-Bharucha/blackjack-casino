<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Cosmetics Shop — Blackjack Casino Royale</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0f;color:#f0f0f0;font-family:'Georgia',serif;min-height:100vh;}

.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(0,0,0,.7);border-bottom:1px solid rgba(201,162,39,.2);position:sticky;top:0;z-index:100;backdrop-filter:blur(8px);}
.nav-logo{color:#ffd764;font-size:20px;font-weight:700;letter-spacing:4px;text-decoration:none;}
.nav-links{display:flex;gap:20px;align-items:center;}
.nav-link{color:rgba(255,255,255,.6);text-decoration:none;font-size:13px;letter-spacing:1px;transition:.2s;}
.nav-link:hover,.nav-link.active{color:#ffd764;}
.nav-balance{color:#4cff91;font-weight:700;font-size:15px;}

.page{max-width:1100px;margin:0 auto;padding:36px 20px;}
.page-title{font-size:30px;color:#ffd764;letter-spacing:4px;margin-bottom:8px;text-align:center;}
.page-sub{text-align:center;color:rgba(255,255,255,.4);font-size:14px;letter-spacing:1px;margin-bottom:40px;}

.shop-layout{display:grid;grid-template-columns:200px 1fr;gap:28px;}
.category-sidebar{position:sticky;top:80px;height:fit-content;}
.cat-item{padding:11px 16px;border-radius:8px;cursor:pointer;font-size:13px;letter-spacing:1px;color:rgba(255,255,255,.5);transition:.2s;margin-bottom:6px;border:1px solid transparent;}
.cat-item:hover{color:#fff;background:rgba(255,255,255,.04);}
.cat-item.active{color:#ffd764;background:rgba(201,162,39,.08);border-color:rgba(201,162,39,.2);}
.cat-icon{margin-right:8px;}

.items-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;}
.item-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:20px;text-align:center;transition:border-color .2s,transform .2s;position:relative;}
.item-card:hover{border-color:rgba(201,162,39,.3);transform:translateY(-2px);}
.item-card.owned{border-color:rgba(76,255,145,.25);}
.item-card.equipped{border-color:#4cff91;background:rgba(76,255,145,.04);}
.item-preview{height:80px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden;}
.item-name{font-size:14px;color:#fff;margin-bottom:4px;font-weight:700;}
.item-desc{font-size:11px;color:rgba(255,255,255,.35);margin-bottom:14px;min-height:28px;}
.item-price{font-size:14px;color:#ffd764;font-weight:700;margin-bottom:12px;}
.item-price.free{color:#4cff91;}
.item-badge{position:absolute;top:10px;right:10px;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;letter-spacing:1px;}
.badge-owned{background:rgba(76,255,145,.2);color:#4cff91;border:1px solid rgba(76,255,145,.3);}
.badge-equipped{background:#4cff91;color:#000;}
.btn{padding:9px 20px;border:none;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;letter-spacing:1px;transition:.2s;width:100%;}
.btn-gold{background:linear-gradient(135deg,#c9a227,#ffd764);color:#1a0a00;}
.btn-gold:hover{filter:brightness(1.1);}
.btn-gold:disabled{opacity:.35;cursor:not-allowed;}
.btn-green{background:linear-gradient(135deg,#00aa44,#4cff91);color:#000;}
.btn-green:hover{filter:brightness(1.1);}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.5);}

/* Card back previews */
.preview-classic_red{background:linear-gradient(135deg,#c0392b,#e74c3c);}
.preview-midnight_blue{background:linear-gradient(135deg,#1a2980,#26d0ce);}
.preview-emerald{background:linear-gradient(135deg,#134e5e,#71b280);}
.preview-gold{background:linear-gradient(135deg,#b8860b,#ffd700);}
.preview-diamond{background:linear-gradient(135deg,#4776e6,#8e54e9);}
/* Felt previews */
.preview-green{background:#1a5e3a;}
.preview-navy{background:#162447;}
.preview-crimson{background:#6b1a1a;}
.preview-black{background:#111;}
.preview-purple{background:#2d1b5e;}
/* Chip previews */
.preview-classic{background:radial-gradient(circle,#fff 30%,#e0c040 30%,#e0c040 38%,#fff 38%);}
.preview-neon{background:radial-gradient(circle,#0ff 30%,#00ff88 30%,#00ff88 38%,#111 38%);box-shadow:0 0 20px #0ff8;}
.preview-gold_chip{background:radial-gradient(circle,#ffd700 30%,#b8860b 30%,#b8860b 38%,#ffd700 38%);}
.preview-diamond_chip{background:radial-gradient(circle,#fff 30%,#89f 30%,#89f 38%,#dde 38%);box-shadow:0 0 16px rgba(136,153,255,.5);}

.preview-card::after{content:'♠';font-size:24px;color:rgba(255,255,255,.4);}
.preview-chip-label::after{content:'●';font-size:36px;}

.toast{position:fixed;bottom:28px;right:28px;background:#1a1a2e;border:1px solid rgba(76,255,145,.4);border-radius:10px;padding:14px 20px;color:#4cff91;font-size:13px;transform:translateY(80px);opacity:0;transition:.3s;z-index:999;}
.toast.show{transform:translateY(0);opacity:1;}

@media(max-width:700px){.shop-layout{grid-template-columns:1fr;}.category-sidebar{position:static;display:flex;gap:8px;overflow-x:auto;padding-bottom:8px;}.cat-item{flex-shrink:0;}}
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="blackjack.html">♠ BLACKJACK</a>
  <div class="nav-links">
    <a class="nav-link" href="blackjack.html">Play</a>
    <a class="nav-link" href="tournament.html">🏆 Tournaments</a>
    <a class="nav-link active" href="shop.html">🎨 Shop</a>
    <a class="nav-link" href="leaderboard.html">Leaderboard</a>
    <a class="nav-link" href="profile.html">Profile</a>
    <span class="nav-balance" id="navBalance">$—</span>
  </div>
</nav>

<div class="page">
  <div class="page-title">🎨 COSMETICS SHOP</div>
  <div class="page-sub">Spend your chips to customize your experience</div>

  <div class="shop-layout">
    <div class="category-sidebar">
      <div class="cat-item active" onclick="filterCat('all')" id="cat-all"><span class="cat-icon">🛍️</span>All Items</div>
      <div class="cat-item" onclick="filterCat('card_back')" id="cat-card_back"><span class="cat-icon">🃏</span>Card Backs</div>
      <div class="cat-item" onclick="filterCat('felt')" id="cat-felt"><span class="cat-icon">🟩</span>Table Felt</div>
      <div class="cat-item" onclick="filterCat('chip')" id="cat-chip"><span class="cat-icon">🔵</span>Chip Designs</div>
    </div>
    <div>
      <div class="items-grid" id="itemsGrid">
        <p style="color:rgba(255,255,255,.3);text-align:center;padding:40px;">Loading shop…</p>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = 'http://blackjack-casino-production.up.railway.app/api';
const token = localStorage.getItem('token');
if (!token) window.location.href = 'index.html';

let allItems = [];
let currentCat = 'all';
let myBalance = 0;

function showToast(msg, ok = true) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = ok ? '#4cff91' : '#ff6b6b';
  t.style.borderColor = ok ? 'rgba(76,255,145,.4)' : 'rgba(255,107,107,.4)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function previewClass(item) {
  if (item.type === 'card_back') return `preview-${item.key_name}`;
  if (item.type === 'felt') return `preview-${item.key_name}`;
  if (item.type === 'chip') {
    if (item.key_name === 'gold') return 'preview-gold_chip';
    if (item.key_name === 'diamond') return 'preview-diamond_chip';
    return `preview-${item.key_name}`;
  }
  return '';
}

function previewIcon(item) {
  if (item.type === 'card_back') return '♠';
  if (item.type === 'felt') return '';
  if (item.type === 'chip') return '●';
  return '';
}

function renderItems(items) {
  if (!items.length) {
    document.getElementById('itemsGrid').innerHTML = `<p style="color:rgba(255,255,255,.3);text-align:center;padding:40px;grid-column:1/-1;">No items in this category</p>`;
    return;
  }
  document.getElementById('itemsGrid').innerHTML = items.map(item => `
    <div class="item-card ${item.equipped ? 'equipped' : item.owned ? 'owned' : ''}" id="card-${item.id}">
      ${item.equipped ? `<div class="item-badge badge-equipped">EQUIPPED</div>` : item.owned ? `<div class="item-badge badge-owned">OWNED</div>` : ''}
      <div class="item-preview ${previewClass(item)}" style="background-size:cover;">
        <span style="font-size:36px;color:rgba(255,255,255,.5);">${previewIcon(item)}</span>
      </div>
      <div class="item-name">${item.name}</div>
      <div class="item-desc">${item.description || ''}</div>
      <div class="item-price ${item.price === 0 ? 'free' : ''}">${item.price === 0 ? 'FREE' : `$${item.price.toLocaleString()} chips`}</div>
      ${renderItemBtn(item)}
    </div>`).join('');
}

function renderItemBtn(item) {
  if (item.equipped) return `<button class="btn btn-outline" disabled>✓ Equipped</button>`;
  if (item.owned)    return `<button class="btn btn-green" onclick="equipItem(${item.id})">Equip</button>`;
  return `<button class="btn btn-gold" onclick="buyItem(${item.id})" ${item.price > myBalance ? 'disabled' : ''}>
    ${item.price > myBalance ? '⛔ Need more chips' : 'Buy Now'}
  </button>`;
}

function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.cat-item').forEach(el => el.classList.remove('active'));
  document.getElementById('cat-' + cat)?.classList.add('active');
  const filtered = cat === 'all' ? allItems : allItems.filter(i => i.type === cat);
  renderItems(filtered);
}

async function loadShop() {
  const data = await fetch(`${API}/cosmetics/shop`, { headers: { Authorization: `Bearer ${token}` } }).then(r => r.json());
  if (data.error) { console.warn(data.error); return; }
  allItems = data;
  filterCat(currentCat);
}

async function buyItem(id) {
  const btn = document.querySelector(`#card-${id} .btn`);
  if (btn) { btn.disabled = true; btn.textContent = 'Buying…'; }

  const data = await fetch(`${API}/cosmetics/buy`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ cosmeticId: id }),
  }).then(r => r.json());

  if (data.error) { showToast('❌ ' + data.error, false); if (btn) { btn.disabled = false; btn.textContent = 'Buy Now'; } return; }

  myBalance = data.newBalance;
  document.getElementById('navBalance').textContent = `$${myBalance.toLocaleString()}`;
  showToast(`✅ Purchased! You now own this item.`);

  // Update local state
  const item = allItems.find(i => i.id === id);
  if (item) { item.owned = true; }
  await loadShop(); // Refresh so equip button appears
}

async function equipItem(id) {
  const data = await fetch(`${API}/cosmetics/equip`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Authorization: `Bearer ${token}` },
    body: JSON.stringify({ cosmeticId: id }),
  }).then(r => r.json());

  if (data.error) { showToast('❌ ' + data.error, false); return; }
  showToast(`✅ Equipped! Your table will look amazing.`);

  // Update local equipped state
  const equipped = data.equipped;
  allItems.forEach(i => {
    if (i.type === equipped.type) i.equipped = false;
  });
  const item = allItems.find(i => i.id === id);
  if (item) item.equipped = true;
  filterCat(currentCat);
}

// Load balance + shop
fetch(`${API}/me`, { headers: { Authorization: `Bearer ${token}` } })
  .then(r => r.json()).then(u => {
    if (u.error) return;
    myBalance = u.balance;
    document.getElementById('navBalance').textContent = `$${u.balance.toLocaleString()}`;
    loadShop();
  }).catch(() => loadShop());
</script>
</body>
</html>
